<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Louvre VR — Lost Treasures</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@200;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #b8976a;
    --bg: #070707;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Inter', 'Helvetica Neue', sans-serif;
  }

  body {
    background: var(--bg);
    color: #fff;
    font-family: var(--sans);
    overflow: hidden;
    height: 100vh; width: 100vw;
  }

  canvas { display: block; }

  /* ── Top Bar ── */
  #top-bar {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 28px 48px;
    pointer-events: none;
  }
  #top-bar a, #top-bar span { pointer-events: auto; }
  #back-link {
    font-family: var(--sans);
    font-size: 10px; font-weight: 300;
    letter-spacing: 5px; text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    display: flex; align-items: center; gap: 14px;
    transition: color 0.4s;
  }
  #back-link::before {
    content: ''; display: block;
    width: 28px; height: 1px;
    background: rgba(255,255,255,0.2);
    transition: width 0.4s, background 0.4s;
  }
  #back-link:hover { color: #fff; }
  #back-link:hover::before { width: 40px; background: var(--gold); }
  #top-logo {
    font-family: var(--serif);
    font-size: 14px; font-weight: 400;
    letter-spacing: 14px; text-transform: uppercase;
    color: var(--gold);
  }

  /* ── VR Button ── */
  #vr-button {
    position: fixed;
    bottom: 40px; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    padding: 18px 56px;
    background: rgba(184,151,106,0.08);
    border: 1px solid rgba(184,151,106,0.5);
    color: var(--gold);
    font-family: var(--sans);
    font-size: 11px; font-weight: 300;
    letter-spacing: 6px; text-transform: uppercase;
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }
  #vr-button::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: -1;
  }
  #vr-button:hover::before { transform: scaleX(1); }
  #vr-button:hover { color: #fff; border-color: var(--gold); }
  #vr-button.unavailable {
    border-color: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.2);
    pointer-events: none;
  }

  /* ── Dummy Toggle Button ── */
  #dummy-toggle {
    position: fixed;
    bottom: 40px; right: 48px;
    z-index: 100;
    padding: 14px 32px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.5);
    font-family: var(--sans);
    font-size: 10px; font-weight: 300;
    letter-spacing: 5px; text-transform: uppercase;
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }
  #dummy-toggle:hover {
    border-color: var(--gold);
    color: var(--gold);
  }
  #dummy-toggle.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(184,151,106,0.1);
  }

  /* ── Bottom hint ── */
  #bottom-hint {
    position: fixed;
    bottom: 100px; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 3px;
    text-transform: uppercase;
    pointer-events: none;
    text-align: center;
    line-height: 2;
  }

  /* ── Loading ── */
  #loading-overlay {
    position: fixed; inset: 0;
    z-index: 1000;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 1.2s ease;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }
  #loading-overlay h2 {
    font-family: var(--serif);
    font-size: 18px; font-weight: 400;
    letter-spacing: 16px; text-transform: uppercase;
    color: var(--gold);
    animation: pulse 2.5s ease-in-out infinite alternate;
  }
  .loader-bar {
    width: 64px; height: 1px;
    background: rgba(184,151,106,0.15);
    position: relative; overflow: hidden;
    margin-top: 32px;
  }
  .loader-bar::after {
    content: ''; position: absolute; left: -60%;
    width: 60%; height: 100%;
    background: var(--gold);
    animation: loading 2s ease-in-out infinite;
  }
  #load-progress {
    margin-top: 20px; font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 4px; font-weight: 200;
  }
  @keyframes pulse { 0% { opacity: 0.3; } 100% { opacity: 1; } }
  @keyframes loading { 0% { left: -60%; } 100% { left: 100%; } }
</style>
</head>
<body>

<div id="loading-overlay">
  <h2>Louvre</h2>
  <div class="loader-bar"></div>
  <div id="load-progress">0 / 4</div>
</div>

<div id="top-bar">
  <a href="index.html" id="back-link">Exhibition</a>
  <span id="top-logo">Louvre</span>
  <span style="width:100px"></span>
</div>

<button id="vr-button">Enter VR</button>
<button id="dummy-toggle">Try On</button>

<div id="bottom-hint">
  Click artifact to rotate &middot; Scroll to zoom &middot; R to reset
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';
import { Reflector } from 'three/addons/objects/Reflector.js';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Artifact Data — scale 줄임
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const artifacts = [
  {
    name: "Crown of Empress Eugénie",
    file: "Meshy_AI_왕관_0404073506_texture.glb",
    scale: 0.7,
    rotationX: 0,
    layFlat: false,
    pedestalPos: new THREE.Vector3(-3, 0, -4),
  },
  {
    name: "Emerald Teardrop Necklace",
    file: "Meshy_AI_Emerald_Teardrop_Halo_0404084536_texture.glb",
    scale: 0.7,
    rotationX: Math.PI,
    rotationZ: Math.PI,
    layFlat: true,
    pedestalPos: new THREE.Vector3(3, 0, -4),
  },
  {
    name: "Sapphire Necklace & Earrings",
    file: "Meshy_AI_Azure_Sapphire_Halo_N_0404093900_texture.glb",
    scale: 0.7,
    rotationX: -Math.PI / 2,
    layFlat: true,
    pedestalPos: new THREE.Vector3(-3, 0, -8),
  },
  {
    name: "Earrings of Empress Eugénie",
    file: "Meshy_AI_외제니_왕후의_귀_0404072330_texture.glb",
    scale: 0.7,
    rotationX: 0,
    layFlat: false,
    pedestalPos: new THREE.Vector3(3, 0, -8),
  }
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Scene
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2418);
scene.fog = new THREE.FogExp2(0x2a2418, 0.015);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.05, 100);
camera.position.set(0, 2.5, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.NoToneMapping;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1.2, -4);
controls.minDistance = 1;
controls.maxDistance = 15;
controls.maxPolarAngle = Math.PI * 0.85;
controls.update();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Lighting — 고급 박물관 조명
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
scene.add(new THREE.AmbientLight(0xfff8f0, 1.2));
scene.add(new THREE.HemisphereLight(0xfff5e6, 0x4a3a2a, 1.0));

// 메인 천장 조명들
const ceilPositions = [[0, 6, -3], [0, 6, -6], [0, 6, -9]];
ceilPositions.forEach(pos => {
  const light = new THREE.PointLight(0xffeedd, 6, 20, 1.3);
  light.position.set(...pos);
  scene.add(light);
});

// 각 유물별 스팟라이트 (따뜻한 핀조명)
artifacts.forEach(art => {
  const spot = new THREE.SpotLight(0xfff0dd, 30, 10, Math.PI / 6, 0.5, 1.0);
  spot.position.set(art.pedestalPos.x, 4.5, art.pedestalPos.z);
  spot.target.position.set(art.pedestalPos.x, 1.4, art.pedestalPos.z);
  spot.castShadow = true;
  spot.shadow.mapSize.set(1024, 1024);
  spot.shadow.bias = -0.001;
  scene.add(spot);
  scene.add(spot.target);
});

// 은은한 벽 워시 라이트
const wallWash1 = new THREE.RectAreaLight(0xfff0dd, 0.8, 12, 4);
wallWash1.position.set(0, 4, -12.9);
wallWash1.lookAt(0, 2, -11);
scene.add(wallWash1);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Museum Room — 갤러리 다폴롱 스타일 전시실
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const roomW = 16, roomH = 7, roomD = 20;
const roomZ = -roomD / 2 + 3;

// ── 공통 재질들
const goldMat = new THREE.MeshStandardMaterial({ color: 0xc9a84c, roughness: 0.2, metalness: 0.85 });
const goldDarkMat = new THREE.MeshStandardMaterial({ color: 0x8a6d2f, roughness: 0.3, metalness: 0.8 });
const goldLightMat = new THREE.MeshStandardMaterial({ color: 0xdabb6e, roughness: 0.25, metalness: 0.75 });
const creamMat = new THREE.MeshStandardMaterial({ color: 0xf5edd6, roughness: 0.6, metalness: 0.02 });
const warmWhiteMat = new THREE.MeshStandardMaterial({ color: 0xe8dfc8, roughness: 0.7, metalness: 0.01 });
const marbleLightMat = new THREE.MeshStandardMaterial({ color: 0xf0e8d5, roughness: 0.15, metalness: 0.05 });
const marbleDarkMat = new THREE.MeshStandardMaterial({ color: 0x3a342a, roughness: 0.2, metalness: 0.08 });
const wallBaseMat = new THREE.MeshStandardMaterial({ color: 0xebe2cc, roughness: 0.65, metalness: 0.02 });
const panelMat = new THREE.MeshStandardMaterial({ color: 0xd4c8a8, roughness: 0.55, metalness: 0.03 });
const darkPanelMat = new THREE.MeshStandardMaterial({ color: 0x2a2418, roughness: 0.4, metalness: 0.1 });

// ── 바닥: 밝은 대리석 + 체커 패턴
const floor = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomD), marbleLightMat);
floor.rotation.x = -Math.PI / 2;
floor.position.set(0, 0, roomZ);
floor.receiveShadow = true;
scene.add(floor);

// 바닥 대리석 체커 패턴
const tileSize = 2;
for (let x = -roomW/2; x < roomW/2; x += tileSize) {
  for (let z = roomZ - roomD/2; z < roomZ + roomD/2; z += tileSize) {
    const ix = Math.floor((x + roomW/2) / tileSize);
    const iz = Math.floor((z - roomZ + roomD/2) / tileSize);
    if ((ix + iz) % 2 === 0) {
      const tile = new THREE.Mesh(
        new THREE.PlaneGeometry(tileSize * 0.95, tileSize * 0.95),
        marbleDarkMat
      );
      tile.rotation.x = -Math.PI / 2;
      tile.position.set(x + tileSize/2, 0.002, z + tileSize/2);
      scene.add(tile);
    }
  }
}

// 바닥 줄눈 라인
const groutMat = new THREE.MeshStandardMaterial({ color: 0x9a927e, roughness: 0.7 });
for (let x = -roomW/2; x <= roomW/2; x += tileSize) {
  const line = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.003, roomD), groutMat);
  line.position.set(x, 0.003, roomZ);
  scene.add(line);
}
for (let z = roomZ - roomD/2; z <= roomZ + roomD/2; z += tileSize) {
  const line = new THREE.Mesh(new THREE.BoxGeometry(roomW, 0.003, 0.02), groutMat);
  line.position.set(0, 0.003, z);
  scene.add(line);
}


// ── 벽 함수: 한쪽 벽 전체를 만드는 함수
function buildWall(side) {
  const wallGroup = new THREE.Group();
  const xSign = side === 'left' ? -1 : 1;
  const xPos = xSign * roomW / 2;
  const rotY = side === 'left' ? Math.PI / 2 : -Math.PI / 2;

  // 벽 베이스
  const wall = new THREE.Mesh(new THREE.PlaneGeometry(roomD, roomH), wallBaseMat);
  wall.rotation.y = rotY;
  wall.position.set(xPos, roomH / 2, roomZ);
  wallGroup.add(wall);

  // 하단 웨인스코팅 (나무 패널 느낌)
  const wainscotH = 1.2;
  const wainscot = new THREE.Mesh(
    new THREE.PlaneGeometry(roomD, wainscotH),
    panelMat
  );
  wainscot.rotation.y = rotY;
  wainscot.position.set(xPos + xSign * (-0.01), wainscotH / 2, roomZ);
  wallGroup.add(wainscot);

  // 필라스터 (기둥 장식) — 벽을 따라 등간격
  const pilasterSpacing = 3.2;
  const numPilasters = Math.floor(roomD / pilasterSpacing) + 1;
  for (let i = 0; i < numPilasters; i++) {
    const pz = roomZ - roomD / 2 + i * pilasterSpacing;
    const pg = new THREE.Group();

    // 기둥 몸체
    const pilBody = new THREE.Mesh(
      new THREE.BoxGeometry(0.25, roomH - 0.5, 0.12),
      creamMat
    );
    pilBody.position.set(xPos + xSign * (-0.06), roomH / 2, pz);
    pg.add(pilBody);

    // 기둥 세로 홈 (플루팅)
    for (let f = -1; f <= 1; f++) {
      const flute = new THREE.Mesh(
        new THREE.BoxGeometry(0.02, roomH - 1.0, 0.13),
        warmWhiteMat
      );
      flute.position.set(xPos + xSign * (-0.06) + f * 0.06, roomH / 2, pz);
      pg.add(flute);
    }

    // 기둥 상단 캐피탈 (코린트식 장식)
    const capital = new THREE.Mesh(
      new THREE.BoxGeometry(0.4, 0.25, 0.2),
      goldMat
    );
    capital.position.set(xPos + xSign * (-0.06), roomH - 0.38, pz);
    pg.add(capital);

    // 캐피탈 장식 — 볼류트 (소용돌이)
    const volute1 = new THREE.Mesh(
      new THREE.TorusGeometry(0.06, 0.015, 8, 16, Math.PI),
      goldLightMat
    );
    volute1.position.set(xPos + xSign * (-0.06) - 0.12, roomH - 0.28, pz);
    volute1.rotation.z = Math.PI / 2;
    pg.add(volute1);
    const volute2 = volute1.clone();
    volute2.position.x = xPos + xSign * (-0.06) + 0.12;
    pg.add(volute2);

    // 기둥 하단 베이스
    const pBase = new THREE.Mesh(
      new THREE.BoxGeometry(0.35, 0.15, 0.18),
      creamMat
    );
    pBase.position.set(xPos + xSign * (-0.06), 0.075, pz);
    pg.add(pBase);
    const pBaseGold = new THREE.Mesh(
      new THREE.BoxGeometry(0.38, 0.03, 0.2),
      goldDarkMat
    );
    pBaseGold.position.set(xPos + xSign * (-0.06), 0.16, pz);
    pg.add(pBaseGold);

    wallGroup.add(pg);
  }

  // 벽 패널 (필라스터 사이)
  for (let i = 0; i < numPilasters - 1; i++) {
    const pz = roomZ - roomD / 2 + i * pilasterSpacing + pilasterSpacing / 2;

    // 상단 패널 (그림 프레임 느낌)
    const upperPanel = new THREE.Mesh(
      new THREE.PlaneGeometry(pilasterSpacing * 0.65, 2.5),
      darkPanelMat
    );
    upperPanel.rotation.y = rotY;
    upperPanel.position.set(xPos + xSign * (-0.015), 4.5, pz);
    wallGroup.add(upperPanel);

    // 상단 패널 골드 프레임
    const frameW = pilasterSpacing * 0.7;
    const frameH = 2.7;
    const fb = 0.05;
    [[frameW, fb, 0, frameH/2 - fb/2], [frameW, fb, 0, -frameH/2 + fb/2],
     [fb, frameH, -frameW/2 + fb/2, 0], [fb, frameH, frameW/2 - fb/2, 0]].forEach(([w,h,ox,oy]) => {
      const fr = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.03), goldMat);
      fr.rotation.y = rotY;
      fr.position.set(xPos + xSign * (-0.02), 4.5 + oy, pz + (side === 'left' ? -ox : ox));
      wallGroup.add(fr);
    });

    // 하단 패널 (웨인스코팅 내부)
    const lowerPanel = new THREE.Mesh(
      new THREE.PlaneGeometry(pilasterSpacing * 0.6, 0.7),
      new THREE.MeshStandardMaterial({ color: 0xc8bb9a, roughness: 0.5, metalness: 0.03 })
    );
    lowerPanel.rotation.y = rotY;
    lowerPanel.position.set(xPos + xSign * (-0.015), 0.6, pz);
    wallGroup.add(lowerPanel);

    // 하단 패널 얇은 골드 프레임
    const lfW = pilasterSpacing * 0.65;
    const lfH = 0.8;
    const lfb = 0.025;
    [[lfW, lfb, 0, lfH/2], [lfW, lfb, 0, -lfH/2],
     [lfb, lfH, -lfW/2, 0], [lfb, lfH, lfW/2, 0]].forEach(([w,h,ox,oy]) => {
      const fr = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.02), goldDarkMat);
      fr.rotation.y = rotY;
      fr.position.set(xPos + xSign * (-0.018), 0.6 + oy, pz + (side === 'left' ? -ox : ox));
      wallGroup.add(fr);
    });

    // 중간 수평 몰딩 (웨인스코팅 상단)
    const midMold = new THREE.Mesh(
      new THREE.BoxGeometry(pilasterSpacing, 0.06, 0.04),
      goldMat
    );
    midMold.rotation.y = rotY;
    midMold.position.set(xPos + xSign * (-0.02), wainscotH + 0.03, pz);
    wallGroup.add(midMold);
  }

  // 벽 상단 코니스 (장식 처마)
  const cornice = new THREE.Mesh(
    new THREE.BoxGeometry(roomD, 0.12, 0.15),
    goldMat
  );
  cornice.rotation.y = rotY;
  cornice.position.set(xPos + xSign * (-0.07), roomH - 0.06, roomZ);
  wallGroup.add(cornice);

  // 코니스 아래 덴틸 몰딩 (톱니 장식)
  for (let d = 0; d < roomD / 0.2; d++) {
    const dz = roomZ - roomD / 2 + d * 0.2 + 0.1;
    if (d % 2 === 0) {
      const dentil = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, 0.08, 0.04),
        goldLightMat
      );
      dentil.rotation.y = rotY;
      dentil.position.set(xPos + xSign * (-0.05), roomH - 0.18, dz);
      wallGroup.add(dentil);
    }
  }

  // 벽 하단 베이스보드
  const baseboard = new THREE.Mesh(
    new THREE.BoxGeometry(roomD, 0.12, 0.06),
    goldDarkMat
  );
  baseboard.rotation.y = rotY;
  baseboard.position.set(xPos + xSign * (-0.03), 0.06, roomZ);
  wallGroup.add(baseboard);

  scene.add(wallGroup);
}

buildWall('left');
buildWall('right');

// ── 뒷벽
const backWall = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomH), wallBaseMat);
backWall.position.set(0, roomH / 2, roomZ - roomD / 2);

// Load Artifacts (GLB)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const loader = new GLTFLoader();
const artifactGroups = [];
let loadedCount = 0;

artifacts.forEach((art, i) => {
  loader.load(
    art.file,
    (gltf) => {
      const model = gltf.scene;
      model.scale.setScalar(art.scale);

      // 먼저 회전 적용 (layFlat은 눕히기 위해 회전이 먼저)
      model.rotation.x = art.rotationX || 0;
      model.rotation.z = art.rotationZ || 0;

      // 회전 후 바운딩박스 계산해서 센터링
      model.updateMatrixWorld(true);
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());

      // 센터링: XZ는 가운데, Y는 바닥 기준
      if (art.layFlat) {
        // 바닥에 눕히기: Y 최소값을 0으로 맞춤
        model.position.set(-center.x, -box.min.y, -center.z);
      } else {
        model.position.sub(center);
      }

      model.traverse(ch => {
        if (ch.isMesh) { ch.castShadow = true; ch.receiveShadow = true; }
      });

      const wrapper = new THREE.Group();
      wrapper.add(model);
      // layFlat: 받침대 표면 바로 위 / 일반: 유리 케이스 중앙
      const artY = art.layFlat
        ? pedH + 0.08   // 받침대 표면 바로 위
        : pedH + 0.06 + 0.6;
      wrapper.position.set(art.pedestalPos.x, artY, art.pedestalPos.z);
      wrapper.userData = {
        isArtifact: true,
        index: i,
        name: art.name,
        originPos: new THREE.Vector3(art.pedestalPos.x, artY, art.pedestalPos.z),
        grabbed: false,
      };
      scene.add(wrapper);
      artifactGroups.push(wrapper);

      loadedCount++;
      document.getElementById('load-progress').textContent = `${loadedCount} / ${artifacts.length}`;
      if (loadedCount === artifacts.length) {
        setTimeout(() => document.getElementById('loading-overlay').classList.add('hidden'), 500);
      }
    },
    (xhr) => {
      if (xhr.total > 0) {
        const pct = Math.round(xhr.loaded / xhr.total * 100);
        document.getElementById('load-progress').textContent = `Loading... ${pct}%`;
      }
    },
    (err) => {
      console.error('GLB error:', art.file, err);
      loadedCount++;
      if (loadedCount === artifacts.length) {
        document.getElementById('loading-overlay').classList.add('hidden');
      }
    }
  );
});

// WebXR
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const vrButton = document.getElementById('vr-button');

if ('xr' in navigator) {
  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (supported) {
      vrButton.addEventListener('click', async () => {
        try {
          const session = await navigator.xr.requestSession('immersive-vr', {
            optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking']
          });
          renderer.xr.setReferenceSpaceType('local-floor');
          renderer.xr.setSession(session);
          vrButton.style.display = 'none';
          document.getElementById('top-bar').style.display = 'none';
          document.getElementById('bottom-hint').style.display = 'none';
          session.addEventListener('end', () => {
            vrButton.style.display = '';
            document.getElementById('top-bar').style.display = '';
            document.getElementById('bottom-hint').style.display = '';
          });
        } catch (e) { console.error('VR error:', e); }
      });
    } else {
      vrButton.textContent = 'VR Not Available';
      vrButton.classList.add('unavailable');
    }
  });
} else {
  vrButton.textContent = 'WebXR Not Supported';
  vrButton.classList.add('unavailable');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// XR Controllers + Grab
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const controllerModelFactory = new XRControllerModelFactory();
const raycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

function makeRay() {
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -5)
  ]);
  return new THREE.Line(g, new THREE.LineBasicMaterial({ color: 0xb8976a, transparent: true, opacity: 0.35 }));
}

const xrControllers = [0, 1].map(i => {
  const ctrl = renderer.xr.getController(i);
  ctrl.add(makeRay());
  scene.add(ctrl);
  const grip = renderer.xr.getControllerGrip(i);
  grip.add(controllerModelFactory.createControllerModel(grip));
  scene.add(grip);
  return { ctrl, grip, grabbed: null, offset: new THREE.Matrix4() };
});

function findHitArtifact(controller) {
  tempMatrix.identity().extractRotation(controller.matrixWorld);
  raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
  const meshes = [];
  artifactGroups.forEach(g => {
    g.traverse(ch => { if (ch.isMesh) { ch.userData._artGroup = g; meshes.push(ch); } });
  });
  const hits = raycaster.intersectObjects(meshes, false);
  return hits.length > 0 ? hits[0].object.userData._artGroup : null;
}

function onGrab(event) {
  const ctrl = event.target;
  const ci = xrControllers.findIndex(c => c.ctrl === ctrl);
  if (ci === -1) return;
  const art = findHitArtifact(ctrl);
  if (art && !art.userData.grabbed) {
    xrControllers[ci].grabbed = art;
    art.userData.grabbed = true;
    const inv = new THREE.Matrix4().copy(ctrl.matrixWorld).invert();
    xrControllers[ci].offset.copy(inv).multiply(art.matrixWorld);
    try {
      const src = renderer.xr.getSession()?.inputSources?.[ci];
      src?.gamepad?.hapticActuators?.[0]?.pulse(0.5, 80);
    } catch(e) {}
  }
}

function onRelease(event) {
  const ctrl = event.target;
  const ci = xrControllers.findIndex(c => c.ctrl === ctrl);
  if (ci === -1) return;
  const art = xrControllers[ci].grabbed;
  if (art) {
    art.userData.grabbed = false;
    xrControllers[ci].grabbed = null;

    // 더미가 켜져 있을 때만 머리에 올리기 가능
    if (!dummyVisible) return;
    const headWorldPos = new THREE.Vector3();
    dummy.userData.headTop.getWorldPosition(headWorldPos);
    const artPos = art.position.clone();
    const dist = artPos.distanceTo(headWorldPos);

    if (dist < 0.6) {
      // 이전에 올려놓은 유물이 있으면 원래 위치로
      if (headArtifact && headArtifact !== art) {
        const idx = headArtifact.userData.index;
        headArtifact.position.copy(headArtifact.userData.originPos);
        headArtifact.rotation.set(0, 0, 0);
        if (headArtifact.children[0]) headArtifact.children[0].scale.setScalar(artifacts[idx].scale);
        headArtifact.userData.onHead = false;
      }
      // 머리 위에 올리기
      art.userData.onHead = true;
      headArtifact = art;
    }
  }
}

xrControllers.forEach(c => {
  c.ctrl.addEventListener('selectstart', onGrab);
  c.ctrl.addEventListener('selectend', onRelease);
  c.ctrl.addEventListener('squeezestart', onGrab);
  c.ctrl.addEventListener('squeezeend', onRelease);
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Desktop: Click + Drag to rotate
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const mouse = new THREE.Vector2();
const dRay = new THREE.Raycaster();
let dGrabbed = null;

renderer.domElement.addEventListener('pointerdown', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  dRay.setFromCamera(mouse, camera);
  const meshes = [];
  artifactGroups.forEach(g => {
    g.traverse(ch => { if (ch.isMesh) { ch.userData._artGroup = g; meshes.push(ch); } });
  });
  const hits = dRay.intersectObjects(meshes, false);
  if (hits.length > 0) {
    dGrabbed = hits[0].object.userData._artGroup;
    controls.enabled = false;
  }
});

renderer.domElement.addEventListener('pointermove', (e) => {
  if (!dGrabbed) return;
  dGrabbed.rotation.y += e.movementX * 0.008;
  dGrabbed.rotation.x += e.movementY * 0.008;
});

renderer.domElement.addEventListener('pointerup', () => {
  if (dGrabbed) {
    // 데스크톱: 더미가 켜져 있을 때만 머리에 올리기
    if (dummyVisible) {
    const headWorldPos = new THREE.Vector3();
    dummy.userData.headTop.getWorldPosition(headWorldPos);
    const artPos = dGrabbed.position.clone();
    if (artPos.distanceTo(headWorldPos) < 1.0) {
      if (headArtifact && headArtifact !== dGrabbed) {
        headArtifact.position.copy(headArtifact.userData.originPos);
        headArtifact.rotation.set(0, 0, 0);
        headArtifact.userData.onHead = false;
      }
      dGrabbed.userData.onHead = true;
      headArtifact = dGrabbed;
    }
    } // dummyVisible 닫기
    dGrabbed = null;
    controls.enabled = true;
  }
});

window.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') {
    artifactGroups.forEach((g, i) => {
      g.position.copy(g.userData.originPos);
      g.rotation.set(0, 0, 0);
      g.userData.onHead = false;
      if (g.children[0]) g.children[0].scale.setScalar(artifacts[i].scale);
    });
    headArtifact = null;
  }
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Hover highlight
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const origEmissives = new Map();
let hovered = null;

function setHighlight(artGroup, on) {
  artGroup.traverse(ch => {
    if (!ch.isMesh) return;
    const mats = Array.isArray(ch.material) ? ch.material : [ch.material];
    mats.forEach(m => {
      if (!m.emissive) return;
      if (on) {
        if (!origEmissives.has(m)) origEmissives.set(m, m.emissive.clone());
        m.emissive.set(0x2a1f0a);
      } else {
        const orig = origEmissives.get(m);
        if (orig) m.emissive.copy(orig);
      }
    });
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Resize
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Render Loop
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
renderer.setAnimationLoop(() => {
  // VR grab follow + thumbstick 확대/축소
  const session = renderer.xr.getSession();
  xrControllers.forEach((state, ci) => {
    if (state.grabbed) {
      const m = new THREE.Matrix4().copy(state.ctrl.matrixWorld).multiply(state.offset);
      state.grabbed.position.setFromMatrixPosition(m);
      state.grabbed.rotation.setFromRotationMatrix(m);

      // 조이스틱 Y축으로 확대/축소 (위로 밀면 확대, 아래로 축소)
      if (session && session.inputSources) {
        for (const src of session.inputSources) {
          if (src.gamepad && src.gamepad.axes.length >= 4) {
            const thumbY = src.gamepad.axes[3]; // Y축 (위: -1, 아래: +1)
            if (Math.abs(thumbY) > 0.15) { // 데드존
              const scaleSpeed = 1 - thumbY * 0.02;
              const model = state.grabbed.children[0];
              if (model) {
                const newScale = model.scale.x * scaleSpeed;
                // 최소 0.2 ~ 최대 3배
                if (newScale >= 0.2 && newScale <= 3.0) {
                  model.scale.setScalar(newScale);
                }
              }
            }
          }
        }
      }
    }
  });

  // VR hover
  if (renderer.xr.isPresenting) {
    let newHov = null;
    xrControllers.forEach(c => {
      const hit = findHitArtifact(c.ctrl);
      if (hit && !hit.userData.grabbed) newHov = hit;
    });
    if (newHov !== hovered) {
      if (hovered) setHighlight(hovered, false);
      hovered = newHov;
      if (hovered) setHighlight(hovered, true);
    }
  }

  // 더미 마네킹: 카메라 앞 거울 쪽에 위치 (거울을 바라봄)
  if (renderer.xr.isPresenting) {
    const camPos = new THREE.Vector3();
    const camDir = new THREE.Vector3();
    camera.getWorldPosition(camPos);
    camera.getWorldDirection(camDir);

    // 더미를 카메라 앞 1.5m에 배치
    dummy.position.set(
      camPos.x + camDir.x * 1.5,
      camPos.y - 0.3,
      camPos.z + camDir.z * 1.5
    );
    // 카메라를 바라보게 (거울에 반사돼 보임)
    dummy.lookAt(camPos.x, dummy.position.y, camPos.z);
    dummy.rotation.y += Math.PI; // 등을 카메라에게
  } else {
    // 데스크톱: 거울 앞 고정
    dummy.position.set(0, 1.5, -6);
    dummy.rotation.y = 0;
  }

  // 머리 위 유물 따라가기
  if (headArtifact && headArtifact.userData.onHead && !headArtifact.userData.grabbed) {
    const headWorldPos = new THREE.Vector3();
    dummy.userData.headTop.getWorldPosition(headWorldPos);
    headArtifact.position.copy(headWorldPos);
    headArtifact.rotation.y = dummy.rotation.y;
  }

  // Auto-rotate (머리 위 유물은 제외)
  artifactGroups.forEach(g => {
    if (!g.userData.grabbed && g !== dGrabbed && !g.userData.onHead) {
      g.rotation.y += 0.002;
    }
  });

  if (!renderer.xr.isPresenting) controls.update();
  renderer.render(scene, camera);
});

</script>
</body>
